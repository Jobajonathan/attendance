{% extends "base.html" %}
{% block title %}Check in{% endblock %}
{% block content %}
  <h1>Check in: {{ session.name }}</h1>
  {% if session.is_closed %}
    <p>This session is closed and no longer accepting check-ins.</p>
  {% else %}
    <form method="post">
      <label>Student ID <input type="text" name="student_id" autofocus required></label>
      <button type="submit">Check in</button>
    </form>
  {% endif %}
{% endblock %}
